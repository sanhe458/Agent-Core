<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件管理 - AI仿人类程序管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    
    <div class="main-content">
        <header class="topbar" id="topbar"></header>
        
        <main class="content-area">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">已安装插件</h3>
                    <button class="btn btn-secondary" id="refreshPlugins">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                        刷新
                    </button>
                </div>
                <div id="plugin-list" class="plugin-list">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <div class="card" style="margin-top: 24px;">
                <div class="card-header">
                    <h3 class="card-title">插件说明</h3>
                </div>
                <div style="color: var(--text-light); line-height: 1.8;">
                    <p style="margin-bottom: 12px;">插件系统允许扩展程序功能，每个插件可以独立运行并与其他系统组件交互。</p>
                    <p style="margin-bottom: 12px;"><strong>可用插件：</strong></p>
                    <ul style="margin-left: 20px; margin-bottom: 12px;">
                        <li><strong>console</strong> - 控制台插件，提供命令行交互功能</li>
                        <li><strong>qq</strong> - QQ插件，集成QQ聊天功能</li>
                    </ul>
                    <p>插件目录位于 <code style="background: rgba(139, 92, 246, 0.1); padding: 2px 6px; border-radius: 4px;">plugins/</code> 目录下，每个插件包含独立的配置文件。</p>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="/static/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadPluginList();
            
            document.getElementById('refreshPlugins').addEventListener('click', loadPluginList);
        });
        
        async function loadPluginList() {
            const pluginList = document.getElementById('plugin-list');
            pluginList.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载中...</p>
                </div>
            `;
            
            try {
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error('加载插件列表失败');
                const config = await response.json();
                const plugins = config.plugins || {};
                
                const pluginEntries = Object.entries(plugins);
                
                if (pluginEntries.length === 0) {
                    pluginList.innerHTML = `
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                            </svg>
                            <p>暂无已安装的插件</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                pluginEntries.forEach(([name, pluginConfig]) => {
                    const isEnabled = pluginConfig.enabled !== false;
                    html += `
                        <div class="plugin-card">
                            <div class="plugin-info">
                                <div class="plugin-icon">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                                    </svg>
                                </div>
                                <div>
                                    <div class="plugin-name">${escapeHtml(name)}</div>
                                    <div class="plugin-status">
                                        <span class="status-badge ${isEnabled ? 'active' : 'inactive'}">
                                            ${isEnabled ? '已启用' : '已禁用'}
                                        </span>
                                        <span>${pluginConfig.config_file || '默认配置'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-secondary" onclick="editPluginConfig('${escapeHtml(name)}')">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                    编辑配置
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                pluginList.innerHTML = html;
                showToast('插件列表加载成功', 'success');
            } catch (error) {
                pluginList.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                        <p>加载失败: ${error.message}</p>
                    </div>
                `;
                showToast('加载插件列表失败: ' + error.message, 'error');
            }
        }
        
        function editPluginConfig(pluginName) {
            showToast('编辑插件配置功能待实现', 'info');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
