<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统日志 - AI仿人类程序管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    
    <div class="main-content">
        <header class="topbar" id="topbar"></header>
        
        <main class="content-area">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">实时日志</h3>
                    <div class="card-actions">
                        <button class="btn btn-secondary" id="clearLogs">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                            清空
                        </button>
                        <button class="btn btn-primary" id="pauseResume">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="pauseIcon">
                                <rect x="6" y="4" width="4" height="16"/>
                                <rect x="14" y="4" width="4" height="16"/>
                            </svg>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="playIcon" style="display: none;">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            <span id="pauseText">暂停</span>
                        </button>
                    </div>
                </div>
                <div id="logs-content" class="logs-container">
                    <div class="log-entry">
                        <span class="log-timestamp">[${getTimestamp()}]</span>
                        <span class="log-level info">INFO</span>
                        <span>日志系统已启动，正在连接日志流...</span>
                    </div>
                </div>
            </div>
            
            <div class="card" style="margin-top: 24px;">
                <div class="card-header">
                    <h3 class="card-title">日志级别说明</h3>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="log-level info">INFO</span>
                        <span style="color: var(--text-light);">一般信息</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="log-level warning">WARN</span>
                        <span style="color: var(--text-light);">警告信息</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="log-level error">ERROR</span>
                        <span style="color: var(--text-light);">错误信息</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="/static/js/layout.js"></script>
    <script>
        let ws = null;
        let isPaused = false;
        let logBuffer = [];
        let maxLogs = 500;
        
        document.addEventListener('DOMContentLoaded', function() {
            startLogStream();
            
            document.getElementById('clearLogs').addEventListener('click', clearLogs);
            document.getElementById('pauseResume').addEventListener('click', togglePause);
        });
        
        function startLogStream() {
            const logsContent = document.getElementById('logs-content');
            
            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws/logs`);
                
                ws.onopen = function() {
                    addLog('INFO', '日志流连接成功');
                };
                
                ws.onmessage = function(event) {
                    if (!isPaused) {
                        addLogEntry(event.data);
                    } else {
                        logBuffer.push(event.data);
                    }
                };
                
                ws.onerror = function(error) {
                    addLog('ERROR', '日志流连接失败');
                };
                
                ws.onclose = function() {
                    addLog('WARN', '日志流连接已关闭，5秒后重连...');
                    setTimeout(startLogStream, 5000);
                };
            } catch (error) {
                addLog('ERROR', '日志流启动失败: ' + error.message);
            }
        }
        
        function addLog(level, message) {
            const logsContent = document.getElementById('logs-content');
            const timestamp = getTimestamp();
            
            const logHtml = `
                <div class="log-entry">
                    <span class="log-timestamp">[${timestamp}]</span>
                    <span class="log-level ${level.toLowerCase()}">${level}</span>
                    <span>${escapeHtml(message)}</span>
                </div>
            `;
            
            logsContent.insertAdjacentHTML('beforeend', logHtml);
            scrollToBottom();
            trimLogs();
        }
        
        function addLogEntry(data) {
            const logsContent = document.getElementById('logs-content');
            
            try {
                const log = JSON.parse(data);
                const level = log.level || 'INFO';
                const message = log.message || data;
                const timestamp = log.timestamp || getTimestamp();
                
                const logHtml = `
                    <div class="log-entry">
                        <span class="log-timestamp">[${timestamp}]</span>
                        <span class="log-level ${level.toLowerCase()}">${level}</span>
                        <span>${escapeHtml(message)}</span>
                    </div>
                `;
                
                logsContent.insertAdjacentHTML('beforeend', logHtml);
            } catch (e) {
                const logHtml = `
                    <div class="log-entry">
                        <span class="log-timestamp">[${getTimestamp()}]</span>
                        <span class="log-level info">INFO</span>
                        <span>${escapeHtml(data)}</span>
                    </div>
                `;
                logsContent.insertAdjacentHTML('beforeend', logHtml);
            }
            
            scrollToBottom();
            trimLogs();
        }
        
        function scrollToBottom() {
            const logsContent = document.getElementById('logs-content');
            logsContent.scrollTop = logsContent.scrollHeight;
        }
        
        function trimLogs() {
            const logsContent = document.getElementById('logs-content');
            const logs = logsContent.querySelectorAll('.log-entry');
            
            if (logs.length > maxLogs) {
                const toRemove = logs.length - maxLogs;
                for (let i = 0; i < toRemove; i++) {
                    logs[i].remove();
                }
            }
        }
        
        function clearLogs() {
            const logsContent = document.getElementById('logs-content');
            logsContent.innerHTML = '';
            logBuffer = [];
            addLog('INFO', '日志已清空');
        }
        
        function togglePause() {
            isPaused = !isPaused;
            
            const pauseIcon = document.getElementById('pauseIcon');
            const playIcon = document.getElementById('playIcon');
            const pauseText = document.getElementById('pauseText');
            
            if (isPaused) {
                pauseIcon.style.display = 'none';
                playIcon.style.display = 'block';
                pauseText.textContent = '继续';
                addLog('INFO', '日志流已暂停');
            } else {
                pauseIcon.style.display = 'block';
                playIcon.style.display = 'none';
                pauseText.textContent = '暂停';
                addLog('INFO', '日志流已继续');
                
                logBuffer.forEach(log => {
                    addLogEntry(log);
                });
                logBuffer = [];
            }
        }
        
        function getTimestamp() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
