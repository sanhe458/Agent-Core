<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - AI仿人类程序管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="sidebar" id="sidebar"></div>
    
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    
    <div class="main-content">
        <header class="topbar" id="topbar"></header>
        
        <main class="content-area">
            <div class="page-header">
                <h1 class="page-title">欢迎回来</h1>
                <p class="page-description">这里是系统的实时状态概览，快速了解当前运行情况</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                        </svg>
                    </div>
                    <div class="stat-label">人物总数</div>
                    <div class="stat-value" id="character-count">0</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon secondary">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div class="stat-label">关系总数</div>
                    <div class="stat-value" id="relationship-count">0</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                    </div>
                    <div class="stat-label">已安装插件</div>
                    <div class="stat-value" id="plugin-count">0</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon warning">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="stat-label">活跃模型</div>
                    <div class="stat-value" id="model-count">0</div>
                </div>
            </div>
            
            <div class="card-grid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">系统状态</h3>
                        <div class="card-actions">
                            <button class="btn-icon" onclick="updateStats()" title="刷新">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="23 4 23 10 17 10"/>
                                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="status-grid" style="grid-template-columns: repeat(2, 1fr);">
                        <div class="status-item">
                            <span class="status-label">服务状态</span>
                            <span class="status-value" id="service-status" style="font-size: 16px;">运行中</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">会话数量</span>
                            <span class="status-value" id="session-count" style="font-size: 16px;">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">模型状态</span>
                            <span class="status-value" id="model-status" style="font-size: 16px;">正常</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">运行时间</span>
                            <span class="status-value" id="uptime" style="font-size: 16px;">--</span>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">人物统计</h3>
                    </div>
                    <canvas id="characterStatsChart" width="300" height="200"></canvas>
                </div>
            </div>
            
            <div class="card" style="margin-top: 24px;">
                <div class="card-header">
                    <h3 class="card-title">快速操作</h3>
                </div>
                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                    <a href="/webui/characters.html" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                        </svg>
                        管理人物
                    </a>
                    <a href="/webui/config.html" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33"/>
                        </svg>
                        系统配置
                    </a>
                    <a href="/webui/plugins.html" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                        插件管理
                    </a>
                    <a href="/webui/logs.html" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                        查看日志
                    </a>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="/static/js/layout.js"></script>
    <script>
        let startTime = Date.now();
        
        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics');
                if (!response.ok) throw new Error('获取统计数据失败');
                return await response.json();
            } catch (error) {
                console.error('获取统计数据失败:', error);
                return {
                    total_characters: 0,
                    total_relationships: 0
                };
            }
        }
        
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) throw new Error('获取配置失败');
                return await response.json();
            } catch (error) {
                console.error('获取配置失败:', error);
                return {};
            }
        }
        
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                if (!response.ok) throw new Error('获取模型失败');
                return await response.json();
            } catch (error) {
                console.error('获取模型失败:', error);
                return {};
            }
        }
        
        async function updateStats() {
            const stats = await loadStatistics();
            const config = await loadConfig();
            const models = await loadModels();
            
            document.getElementById('character-count').textContent = stats.total_characters || 0;
            document.getElementById('relationship-count').textContent = stats.total_relationships || 0;
            
            const pluginCount = Object.keys(config.plugins || {}).length;
            document.getElementById('plugin-count').textContent = pluginCount;
            
            const modelCount = Object.keys(models).length;
            document.getElementById('model-count').textContent = modelCount;
            
            updateUptime();
        }
        
        function updateUptime() {
            const elapsed = Date.now() - startTime;
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            document.getElementById('uptime').textContent = `${hours}小时${minutes}分`;
        }
        
        function renderChart() {
            const canvas = document.getElementById('characterStatsChart');
            const ctx = canvas.getContext('2d');
            
            const data = {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                values: [12, 19, 15, 25, 22, 30]
            };
            
            const maxValue = Math.max(...data.values) * 1.2;
            const barWidth = (canvas.width - 60) / data.values.length - 20;
            const startX = 40;
            const startY = 20;
            const chartHeight = canvas.height - 50;
            
            ctx.fillStyle = '#9ca3af';
            ctx.font = '12px Inter, sans-serif';
            ctx.textAlign = 'center';
            
            data.values.forEach((value, index) => {
                const barHeight = (value / maxValue) * chartHeight;
                const x = startX + index * ((canvas.width - 40) / data.values.length) + 10;
                const y = startY + chartHeight - barHeight;
                
                const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
                gradient.addColorStop(0, '#8b5cf6');
                gradient.addColorStop(1, '#f472b6');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, barHeight, 4);
                ctx.fill();
                
                ctx.fillStyle = '#6b7280';
                ctx.fillText(data.labels[index], x + barWidth / 2, canvas.height - 10);
                
                ctx.fillStyle = '#374151';
                ctx.font = 'bold 11px Inter, sans-serif';
                ctx.fillText(value.toString(), x + barWidth / 2, y - 8);
                ctx.font = '12px Inter, sans-serif';
            });
            
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(30, startY);
            ctx.lineTo(30, startY + chartHeight);
            ctx.lineTo(canvas.width - 10, startY + chartHeight);
            ctx.stroke();
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await updateStats();
            renderChart();
            
            setInterval(updateUptime, 60000);
            
            setInterval(async () => {
                await updateStats();
            }, 30000);
        });
    </script>
</body>
</html>
