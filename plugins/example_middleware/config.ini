# 示例中间件插件
# desc: 展示中间件插件开发示例，包含消息过滤和日志记录功能

[general]
# title: 通用配置
# desc: 插件通用设置

# title: 启用插件
# desc: 是否启用该插件
# type: bool
enabled = true

# title: 优先级
# desc: 中间件执行优先级，数值越小优先级越高（默认100）
# type: number
priority = 50

# title: 阻塞词列表
# desc: 消息中包含这些词时将被拦截，多个词用逗号分隔
# type: string
blocked_words = badword,spam,advertisement

[logging]
# title: 日志配置
# desc: 日志记录相关设置

# title: 启用详细日志
# desc: 是否记录详细的处理日志
# type: bool
verbose_logging = false

# title: 日志级别
# desc: 日志记录级别
# type: select
# options: DEBUG,INFO,WARNING,ERROR
log_level = INFO
