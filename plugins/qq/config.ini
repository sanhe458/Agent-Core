# title: QQ插件
# desc: QQ消息平台适配器（基于 NapCat / OneBot v11）

[general]
# title: 通用配置
# desc: 插件通用设置

# title: 启用插件
# desc: 是否启用该插件
# type: bool
enabled = true

# title: 名称
# desc: 插件显示名称
# type: string
name = QQ

# title: 描述
# desc: 插件描述
# type: string
description = QQ消息平台适配器 (NapCat/OneBot v11)

[server]
# title: 服务器配置
# desc: NapCat WebSocket 服务器连接配置

# title: 主机
# desc: NapCat WebSocket 服务器地址
# type: string
host = localhost

# title: 端口
# desc: NapCat WebSocket 服务器端口（默认 3000）
# type: number
port = 3000

# title: 访问令牌
# desc: NapCat 访问令牌，留空表示不需要认证
# type: string
token =

# title: 重连延迟
# desc: 连接断开后重连延迟（秒）
# type: number
reconnect_delay = 5

# title: 心跳间隔
# desc: WebSocket 心跳检测间隔（秒），0 表示禁用
# type: number
heartbeat_interval = 30

# title: API 调用超时
# desc: OneBot action 调用超时时间（秒）
# type: number
action_timeout = 30

[message]
# title: 消息配置
# desc: 消息处理与过滤配置

# title: 允许的群列表
# desc: 留空表示接收所有群消息，填写群号列表可限制接收范围
# type: list
group_list = []

# title: 允许的私聊列表
# desc: 留空表示接收所有私聊，填写用户 ID 列表可限制接收范围
# type: list
private_list = []

# title: 屏蔽的用户 ID
# desc: 屏蔽指定用户的消息，不受群/私聊列表限制
# type: list
ban_user_id = []

# title: 最大消息长度
# desc: 最大消息长度限制
# type: number
max_message_length = 2000

# title: 消息队列大小
# desc: 消息队列最大长度
# type: number
queue_size = 100

# title: 消息超时
# desc: 消息处理超时时间（秒）
# type: number
timeout = 30
