# title: QQ插件
# desc: QQ消息平台适配器

[general]
# title: 通用配置
# desc: 插件通用设置

# title: 启用插件
# desc: 是否启用该插件
# type: bool
enabled = true

# title: 名称
# desc: 插件显示名称
# type: string
name = QQ

# title: 描述
# desc: 插件描述
# type: string
description = QQ消息平台适配器

[server]
# title: 服务器配置
# desc: WebSocket服务器配置

# title: 主机
# desc: WebSocket服务器主机
# type: string
host = localhost

# title: 端口
# desc: WebSocket服务器端口
# type: number
port = 8080

# title: 令牌
# desc: 连接令牌，留空表示不需要认证
# type: string
token = 

[message]
# title: 消息配置
# desc: 消息处理配置

# title: 最大消息长度
# desc: 最大消息长度
# type: number
max_message_length = 2000

# title: 消息队列大小
# desc: 消息队列最大长度
# type: number
queue_size = 100

# title: 消息超时
# desc: 消息处理超时时间（秒）
# type: number
timeout = 30