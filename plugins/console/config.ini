# title: 控制台插件
# desc: 基础的控制台输入输出插件

[general]
# title: 通用配置
# desc: 插件通用设置

# title: 启用插件
# desc: 是否启用该插件
# type: bool
enabled = true

# title: 名称
# desc: 插件显示名称
# type: string
name = Console

# title: 描述
# desc: 插件描述
# type: string
description = 基础的控制台输入输出插件

[settings]
# title: 显示设置
# desc: 控制台显示设置

# title: 显示时间戳
# desc: 是否在输出中显示时间戳
# type: bool
timestamp = true

# title: 显示颜色
# desc: 是否在输出中使用颜色
# type: bool
colors = true

# title: 最大历史记录
# desc: 保存的最大历史记录数
# type: number
history_size = 100

# title: 输入提示符
# desc: 输入提示符
# type: string
prompt = > 