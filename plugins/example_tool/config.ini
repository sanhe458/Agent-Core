# title: 示例工具插件
# desc: 提供天气查询和当前时间获取的示例工具插件

[general]
# title: 通用配置
# desc: 插件通用设置

# title: 启用插件
# desc: 是否启用该插件
# type: bool
enabled = true

# title: 名称
# desc: 插件显示名称
# type: string
name = Example Tool

# title: 描述
# desc: 插件描述
# type: string
description = 示例工具插件，提供天气查询和时间获取功能

[weather]
# title: 天气配置
# desc: 天气相关设置

# title: 默认城市
# desc: 默认查询天气时使用的城市
# type: string
default_city = 北京

# title: 温度单位
# desc: 温度显示单位
# type: string
# options: celsius, fahrenheit
temperature_unit = celsius

# title: API超时
# desc: 天气API请求超时时间（秒）
# type: number
api_timeout = 5

[time]
# title: 时间配置
# desc: 时间相关设置

# title: 时区
# desc: 使用的时区
# type: string
timezone = Asia/Shanghai

# title: 24小时制
# desc: 是否使用24小时制
# type: bool
use_24hour = true

# title: 显示星期
# desc: 是否在结果中显示星期几
# type: bool
show_weekday = true
